version: "3.8"

services:
  api:
    build:
      context: .
      args:
        TORCH_DEVICE: cpu   # change to "gpu" for CUDA (requires nvidia-docker)
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - UVICORN_WORKERS=1       # uvicorn worker processes (bump for multi-core)
      - NUM_WORKERS=2           # asyncio worker coroutines per process
      - EXECUTOR_THREADS=4      # thread pool for model inference
      - QUEUE_MAXSIZE=500
      - NSFW_THRESHOLD=0.8
      - RATE_LIMIT=60/minute
      - WEBHOOK_MAX_RETRIES=3
      - LOG_FORMAT=text         # set to "json" for production
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 2G            # prevent OOM from large image processing
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
